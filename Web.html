<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doit — To-Do List</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0f;
    --surface: #1a1a1c;
    --surface2: #242427;
    --accent: #f0c060;
    --accent2: #e07050;
    --text: #f0ede8;
    --muted: #6b6b72;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 48px 16px 80px;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 700px; height: 500px;
    background: radial-gradient(ellipse, rgba(240,192,96,0.10) 0%, transparent 70%);
    pointer-events: none;
  }

  .app { width: 100%; max-width: 640px; }

  header { margin-bottom: 36px; animation: fadeDown 0.6s ease both; }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.4rem, 8vw, 3.5rem);
    font-weight: 900;
    line-height: 1;
    letter-spacing: -1px;
  }
  header h1 span { color: var(--accent); }
  header p { margin-top: 8px; color: var(--muted); font-size: 0.95rem; font-weight: 300; }

  /* Stats */
  .stats { display: flex; gap: 12px; margin-bottom: 24px; animation: fadeDown 0.6s 0.1s ease both; flex-wrap: wrap; }
  .stat {
    background: var(--surface);
    border: 1px solid #2d2d32;
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 0.82rem;
    color: var(--muted);
    flex: 1; min-width: 70px;
  }
  .stat strong { color: var(--text); font-size: 1.1rem; display: block; }
  .stat.overdue-stat strong { color: #f07060; }

  /* Input card */
  .input-card {
    background: var(--surface);
    border: 1px solid #2d2d32;
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 24px;
    animation: fadeDown 0.6s 0.15s ease both;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .input-card input[type="text"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid #2d2d32;
    border-radius: 10px;
    padding: 13px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.98rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-card input[type="text"]::placeholder { color: var(--muted); }
  .input-card input[type="text"]:focus { border-color: var(--accent); }

  .input-row2 {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  .input-row2 select,
  .input-row2 input[type="date"],
  .input-row2 input[type="time"] {
    background: var(--surface2);
    border: 1px solid #2d2d32;
    border-radius: 10px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.87rem;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
    flex: 1;
    min-width: 110px;
  }
  .input-row2 input[type="date"]:focus,
  .input-row2 input[type="time"]:focus,
  .input-row2 select:focus { border-color: var(--accent); }

  .input-row2 input[type="date"]::-webkit-calendar-picker-indicator,
  .input-row2 input[type="time"]::-webkit-calendar-picker-indicator {
    filter: invert(0.55);
    cursor: pointer;
  }

  .datetime-hint {
    font-size: 0.74rem;
    color: var(--muted);
    margin-top: -4px;
  }

  .btn-add {
    background: var(--accent);
    color: #111;
    border: none;
    border-radius: 10px;
    padding: 10px 22px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 0.95rem;
    cursor: pointer;
    transition: transform 0.15s, background 0.2s;
    white-space: nowrap;
  }
  .btn-add:hover { background: #f5d080; transform: translateY(-1px); }
  .btn-add:active { transform: translateY(1px); }

  /* Filters */
  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    animation: fadeDown 0.6s 0.2s ease both;
  }
  .filter-btn {
    background: none;
    border: 1px solid #2d2d32;
    border-radius: 50px;
    padding: 6px 14px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.83rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #111;
    font-weight: 500;
  }

  /* Task list */
  .task-list { display: flex; flex-direction: column; gap: 10px; }

  .task-item {
    background: var(--surface);
    border: 1px solid #2a2a2e;
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    transition: transform 0.2s, opacity 0.3s, border-color 0.2s;
    animation: slideIn 0.3s ease both;
  }
  .task-item:hover { border-color: #3a3a42; transform: translateX(3px); }
  .task-item.done { opacity: 0.45; }
  .task-item.done .task-text { text-decoration: line-through; color: var(--muted); }
  .task-item.overdue:not(.done) { border-color: rgba(240,100,80,0.4); background: rgba(240,100,80,0.04); }

  .checkbox {
    width: 22px; height: 22px;
    border: 2px solid #3a3a42;
    border-radius: 6px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    margin-top: 2px;
  }
  .task-item.done .checkbox { background: var(--accent); border-color: var(--accent); }
  .checkbox::after { content: '✓'; font-size: 13px; color: #111; opacity: 0; transition: opacity 0.15s; }
  .task-item.done .checkbox::after { opacity: 1; }

  .task-body { flex: 1; min-width: 0; }

  .task-text {
    font-size: 0.97rem;
    font-weight: 400;
    overflow-wrap: break-word;
    word-break: break-word;
    line-height: 1.4;
  }

  .task-meta {
    display: flex;
    gap: 8px;
    margin-top: 6px;
    align-items: center;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 0.71rem;
    padding: 2px 8px;
    border-radius: 50px;
    font-weight: 500;
    letter-spacing: 0.3px;
  }
  .tag-work     { background: rgba(100,150,255,0.15); color: #88aaff; }
  .tag-personal { background: rgba(100,220,150,0.15); color: #66dd99; }
  .tag-urgent   { background: rgba(240,100,80,0.15);  color: #f07060; }
  .tag-other    { background: rgba(180,140,255,0.12); color: #b890ff; }

  .due-badge {
    font-size: 0.71rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .task-item.overdue:not(.done) .due-badge { color: #f07060; }

  .overdue-label {
    font-size: 0.68rem;
    background: rgba(240,100,80,0.18);
    color: #f07060;
    padding: 2px 7px;
    border-radius: 50px;
    font-weight: 500;
  }

  .btn-del {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 4px 6px;
    border-radius: 6px;
    transition: color 0.2s, background 0.2s;
    line-height: 1;
    flex-shrink: 0;
  }
  .btn-del:hover { color: #f07060; background: rgba(240,100,80,0.1); }

  .empty {
    text-align: center;
    padding: 60px 0;
    color: var(--muted);
    font-size: 0.95rem;
    animation: fadeDown 0.4s ease both;
  }
  .empty .icon { font-size: 2.5rem; margin-bottom: 12px; }

  .progress-wrap {
    background: var(--surface2);
    border-radius: 50px;
    height: 5px;
    margin-top: 30px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 50px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-16px); }
    to   { opacity: 1; transform: translateX(0); }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Do<span>it</span></h1>
    <p>Your tasks, beautifully organized.</p>
  </header>

  <div class="stats">
    <div class="stat"><strong id="stat-total">0</strong>Total</div>
    <div class="stat"><strong id="stat-done">0</strong>Done</div>
    <div class="stat"><strong id="stat-left">0</strong>Left</div>
    <div class="stat overdue-stat"><strong id="stat-overdue">0</strong>Overdue</div>
  </div>

  <!-- Input card -->
  <div class="input-card">
    <input id="task-input" type="text" placeholder="What do you need to do?" maxlength="160" />
    <div class="input-row2">
      <select id="tag-select">
        <option value="work">💼 Work</option>
        <option value="personal">🌿 Personal</option>
        <option value="urgent">🔥 Urgent</option>
        <option value="other">✨ Other</option>
      </select>
      <input type="date" id="due-date" title="Due date" />
      <input type="time" id="due-time" title="Due time" />
      <button class="btn-add" onclick="addTask()">+ Add</button>
    </div>
    <p class="datetime-hint">📅 Date &amp; time are optional. Tasks with past due dates will be marked overdue.</p>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
    <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
    <button class="filter-btn" onclick="setFilter('overdue', this)">🔴 Overdue</button>
    <button class="filter-btn" onclick="setFilter('work', this)">💼 Work</button>
    <button class="filter-btn" onclick="setFilter('personal', this)">🌿 Personal</button>
    <button class="filter-btn" onclick="setFilter('urgent', this)">🔥 Urgent</button>
  </div>

  <div class="task-list" id="task-list"></div>

  <div class="progress-wrap">
    <div class="progress-bar" id="progress-bar" style="width:0%"></div>
  </div>
</div>

<script>
  let tasks = JSON.parse(localStorage.getItem('doit_tasks_v2') || '[]');
  let filter = 'all';

  function save() { localStorage.setItem('doit_tasks_v2', JSON.stringify(tasks)); }

  function addTask() {
    const input   = document.getElementById('task-input');
    const tag     = document.getElementById('tag-select').value;
    const dueDate = document.getElementById('due-date').value;  // "YYYY-MM-DD" or ""
    const dueTime = document.getElementById('due-time').value;  // "HH:MM" or ""
    const text    = input.value.trim();
    if (!text) { input.focus(); return; }

    tasks.unshift({
      id: Date.now(),
      text,
      tag,
      done: false,
      dueDate,
      dueTime,
    });
    save();
    render();

    input.value = '';
    document.getElementById('due-date').value = '';
    document.getElementById('due-time').value = '';
    input.focus();
  }

  function toggleTask(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save(); render();
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function isOverdue(task) {
    if (task.done || !task.dueDate) return false;
    const now = new Date();
    const due = task.dueTime
      ? new Date(task.dueDate + 'T' + task.dueTime)
      : new Date(task.dueDate + 'T23:59:59');
    return due < now;
  }

  function formatDue(task) {
    if (!task.dueDate) return null;
    const d     = new Date(task.dueDate + 'T00:00:00');
    const today = new Date(); today.setHours(0,0,0,0);
    const tom   = new Date(today); tom.setDate(today.getDate() + 1);

    let dayStr;
    if (d.getTime() === today.getTime())     dayStr = 'Today';
    else if (d.getTime() === tom.getTime())  dayStr = 'Tomorrow';
    else dayStr = d.toLocaleDateString('en-US', {
      month: 'short', day: 'numeric',
      year: d.getFullYear() !== today.getFullYear() ? 'numeric' : undefined
    });

    let timeStr = '';
    if (task.dueTime) {
      const [h, m] = task.dueTime.split(':').map(Number);
      const ampm = h >= 12 ? 'PM' : 'AM';
      timeStr = ` ${h % 12 || 12}:${String(m).padStart(2,'0')} ${ampm}`;
    }
    return dayStr + timeStr;
  }

  function render() {
    const list = document.getElementById('task-list');
    const total      = tasks.length;
    const done       = tasks.filter(t => t.done).length;
    const overdueCt  = tasks.filter(t => isOverdue(t)).length;

    document.getElementById('stat-total').textContent   = total;
    document.getElementById('stat-done').textContent    = done;
    document.getElementById('stat-left').textContent    = total - done;
    document.getElementById('stat-overdue').textContent = overdueCt;
    document.getElementById('progress-bar').style.width = total ? (done/total*100)+'%' : '0%';

    let filtered = [...tasks];
    if (filter === 'active')   filtered = tasks.filter(t => !t.done);
    else if (filter === 'done')    filtered = tasks.filter(t => t.done);
    else if (filter === 'overdue') filtered = tasks.filter(t => isOverdue(t));
    else if (['work','personal','urgent','other'].includes(filter))
      filtered = tasks.filter(t => t.tag === filter);

    if (!filtered.length) {
      list.innerHTML = `<div class="empty"><div class="icon">✦</div>No tasks here yet.</div>`;
      return;
    }

    const tagLabel = { work:'💼 Work', personal:'🌿 Personal', urgent:'🔥 Urgent', other:'✨ Other' };

    list.innerHTML = filtered.map(t => {
      const overdue = isOverdue(t);
      const dueStr  = formatDue(t);
      return `
      <div class="task-item ${t.done ? 'done' : ''} ${overdue ? 'overdue' : ''}">
        <div class="checkbox" onclick="toggleTask(${t.id})"></div>
        <div class="task-body">
          <div class="task-text">${escHtml(t.text)}</div>
          <div class="task-meta">
            <span class="tag tag-${t.tag}">${tagLabel[t.tag]}</span>
            ${dueStr ? `<span class="due-badge">🕐 ${escHtml(dueStr)}</span>` : ''}
            ${overdue ? `<span class="overdue-label">Overdue</span>` : ''}
          </div>
        </div>
        <button class="btn-del" onclick="deleteTask(${t.id})" title="Delete">✕</button>
      </div>`;
    }).join('');
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  document.getElementById('task-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  // Refresh overdue status every minute
  setInterval(render, 60000);

  render();
</script>
</body>
</html>
