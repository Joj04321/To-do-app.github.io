<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doit — To-Do List</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0f;
    --surface: #1a1a1c;
    --surface2: #242427;
    --accent: #f0c060;
    --accent2: #e07050;
    --text: #f0ede8;
    --muted: #6b6b72;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 48px 16px 80px;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px; left: 50%;
    transform: translateX(-50%);
    width: 700px; height: 500px;
    background: radial-gradient(ellipse, rgba(240,192,96,0.10) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ───────────── LOGIN PAGE ───────────── */
  #login-page {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 60px;
    animation: fadeDown 0.6s ease both;
  }

  .login-logo {
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    font-weight: 900;
    letter-spacing: -1px;
    margin-bottom: 6px;
  }
  .login-logo span { color: var(--accent); }

  .login-tagline {
    color: var(--muted);
    font-size: 0.92rem;
    margin-bottom: 40px;
  }

  .login-card {
    background: var(--surface);
    border: 1px solid #2d2d32;
    border-radius: var(--radius);
    padding: 32px 28px;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .login-card h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 4px;
  }

  /* hint box */
  .login-hint {
    background: rgba(240,192,96,0.08);
    border: 1px solid rgba(240,192,96,0.22);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 0.83rem;
    color: #c8a84a;
    line-height: 1.6;
  }
  .login-hint strong { color: var(--accent); }

  .field-label {
    font-size: 0.78rem;
    font-weight: 500;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
    display: block;
  }

  .login-card input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid #2d2d32;
    border-radius: 10px;
    padding: 13px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.97rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .login-card input::placeholder { color: var(--muted); }
  .login-card input:focus { border-color: var(--accent); }

  .login-error {
    background: rgba(240,80,60,0.1);
    border: 1px solid rgba(240,80,60,0.3);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 0.85rem;
    color: #f07060;
    display: none;
  }
  .login-error.show { display: block; }

  .btn-login {
    width: 100%;
    background: var(--accent);
    color: #111;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    margin-top: 4px;
  }
  .btn-login:hover { background: #f5d080; transform: translateY(-1px); }
  .btn-login:active { transform: translateY(1px); }

  /* ───────────── APP PAGE ───────────── */
  #app-page {
    width: 100%;
    max-width: 640px;
    display: none;
  }
  #app-page.visible { display: block; }

  .app-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 36px;
    animation: fadeDown 0.6s ease both;
  }

  .app-topbar h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.2rem, 7vw, 3rem);
    font-weight: 900;
    line-height: 1;
    letter-spacing: -1px;
  }
  .app-topbar h1 span { color: var(--accent); }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .user-badge {
    background: var(--surface);
    border: 1px solid #2d2d32;
    border-radius: 50px;
    padding: 6px 14px;
    font-size: 0.83rem;
    color: var(--muted);
  }
  .user-badge strong { color: var(--accent); }

  .btn-logout {
    background: none;
    border: 1px solid #2d2d32;
    border-radius: 50px;
    padding: 6px 14px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.83rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-logout:hover { border-color: #f07060; color: #f07060; }

  /* Stats */
  .stats { display: flex; gap: 12px; margin-bottom: 24px; animation: fadeDown 0.6s 0.1s ease both; flex-wrap: wrap; }
  .stat {
    background: var(--surface);
    border: 1px solid #2d2d32;
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 0.82rem;
    color: var(--muted);
    flex: 1; min-width: 70px;
  }
  .stat strong { color: var(--text); font-size: 1.1rem; display: block; }
  .stat.overdue-stat strong { color: #f07060; }

  /* Input card */
  .input-card {
    background: var(--surface);
    border: 1px solid #2d2d32;
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 24px;
    animation: fadeDown 0.6s 0.15s ease both;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .input-card input[type="text"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid #2d2d32;
    border-radius: 10px;
    padding: 13px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.98rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .input-card input[type="text"]::placeholder { color: var(--muted); }
  .input-card input[type="text"]:focus { border-color: var(--accent); }

  .input-row2 {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  .input-row2 select,
  .input-row2 input[type="date"],
  .input-row2 input[type="time"] {
    background: var(--surface2);
    border: 1px solid #2d2d32;
    border-radius: 10px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.87rem;
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
    flex: 1;
    min-width: 110px;
  }
  .input-row2 input[type="date"]:focus,
  .input-row2 input[type="time"]:focus,
  .input-row2 select:focus { border-color: var(--accent); }

  .input-row2 input[type="date"]::-webkit-calendar-picker-indicator,
  .input-row2 input[type="time"]::-webkit-calendar-picker-indicator {
    filter: invert(0.55);
    cursor: pointer;
  }

  .datetime-hint { font-size: 0.74rem; color: var(--muted); margin-top: -4px; }

  .btn-add {
    background: var(--accent);
    color: #111;
    border: none;
    border-radius: 10px;
    padding: 10px 22px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
    font-size: 0.95rem;
    cursor: pointer;
    transition: transform 0.15s, background 0.2s;
    white-space: nowrap;
  }
  .btn-add:hover { background: #f5d080; transform: translateY(-1px); }
  .btn-add:active { transform: translateY(1px); }

  /* Filters */
  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    animation: fadeDown 0.6s 0.2s ease both;
  }
  .filter-btn {
    background: none;
    border: 1px solid #2d2d32;
    border-radius: 50px;
    padding: 6px 14px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.83rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #111;
    font-weight: 500;
  }

  /* Task list */
  .task-list { display: flex; flex-direction: column; gap: 10px; }

  .task-item {
    background: var(--surface);
    border: 1px solid #2a2a2e;
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    transition: transform 0.2s, opacity 0.3s, border-color 0.2s;
    animation: slideIn 0.3s ease both;
  }
  .task-item:hover { border-color: #3a3a42; transform: translateX(3px); }
  .task-item.done { opacity: 0.45; }
  .task-item.done .task-text { text-decoration: line-through; color: var(--muted); }
  .task-item.overdue:not(.done) { border-color: rgba(240,100,80,0.4); background: rgba(240,100,80,0.04); }

  .checkbox {
    width: 22px; height: 22px;
    border: 2px solid #3a3a42;
    border-radius: 6px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    margin-top: 2px;
  }
  .task-item.done .checkbox { background: var(--accent); border-color: var(--accent); }
  .checkbox::after { content: '✓'; font-size: 13px; color: #111; opacity: 0; transition: opacity 0.15s; }
  .task-item.done .checkbox::after { opacity: 1; }

  .task-body { flex: 1; min-width: 0; }

  .task-text {
    font-size: 0.97rem;
    font-weight: 400;
    overflow-wrap: break-word;
    word-break: break-word;
    line-height: 1.4;
  }

  .task-meta {
    display: flex;
    gap: 8px;
    margin-top: 6px;
    align-items: center;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 0.71rem;
    padding: 2px 8px;
    border-radius: 50px;
    font-weight: 500;
    letter-spacing: 0.3px;
  }
  .tag-work     { background: rgba(100,150,255,0.15); color: #88aaff; }
  .tag-personal { background: rgba(100,220,150,0.15); color: #66dd99; }
  .tag-urgent   { background: rgba(240,100,80,0.15);  color: #f07060; }
  .tag-other    { background: rgba(180,140,255,0.12); color: #b890ff; }

  .due-badge {
    font-size: 0.71rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .task-item.overdue:not(.done) .due-badge { color: #f07060; }

  .overdue-label {
    font-size: 0.68rem;
    background: rgba(240,100,80,0.18);
    color: #f07060;
    padding: 2px 7px;
    border-radius: 50px;
    font-weight: 500;
  }

  .btn-del {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 4px 6px;
    border-radius: 6px;
    transition: color 0.2s, background 0.2s;
    line-height: 1;
    flex-shrink: 0;
  }
  .btn-del:hover { color: #f07060; background: rgba(240,100,80,0.1); }

  .empty {
    text-align: center;
    padding: 60px 0;
    color: var(--muted);
    font-size: 0.95rem;
    animation: fadeDown 0.4s ease both;
  }
  .empty .icon { font-size: 2.5rem; margin-bottom: 12px; }

  .progress-wrap {
    background: var(--surface2);
    border-radius: 50px;
    height: 5px;
    margin-top: 30px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 50px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-16px); }
    to   { opacity: 1; transform: translateX(0); }
  }
</style>
</head>
<body>

<!-- ═══════════════ LOGIN PAGE ═══════════════ -->
<div id="login-page">
  <div class="login-logo">Do<span>it</span></div>
  <p class="login-tagline">Sign in to manage your tasks</p>

  <div class="login-card">
    <h2>Welcome back 👋</h2>

    <!-- Hint box showing credentials -->
    <div class="login-hint">
      🔑 <strong>Demo credentials</strong><br>
      Username: <strong>test</strong> &nbsp;|&nbsp; Password: <strong>test</strong>
    </div>

    <div>
      <label class="field-label" for="login-username">Username</label>
      <input id="login-username" type="text" placeholder="Enter username" autocomplete="username" />
    </div>

    <div>
      <label class="field-label" for="login-password">Password</label>
      <input id="login-password" type="password" placeholder="Enter password" autocomplete="current-password" />
    </div>

    <div class="login-error" id="login-error">❌ Incorrect username or password. Try again.</div>

    <button class="btn-login" onclick="doLogin()">Sign In</button>
  </div>
</div>

<!-- ═══════════════ APP PAGE ═══════════════ -->
<div id="app-page">
  <div class="app-topbar">
    <h1>Do<span>it</span></h1>
    <div class="topbar-right">
      <div class="user-badge">👤 <strong id="logged-user">test</strong></div>
      <button class="btn-logout" onclick="doLogout()">Sign out</button>
    </div>
  </div>

  <div class="stats">
    <div class="stat"><strong id="stat-total">0</strong>Total</div>
    <div class="stat"><strong id="stat-done">0</strong>Done</div>
    <div class="stat"><strong id="stat-left">0</strong>Left</div>
    <div class="stat overdue-stat"><strong id="stat-overdue">0</strong>Overdue</div>
  </div>

  <div class="input-card">
    <input id="task-input" type="text" placeholder="What do you need to do?" maxlength="160" />
    <div class="input-row2">
      <select id="tag-select">
        <option value="work">💼 Work</option>
        <option value="personal">🌿 Personal</option>
        <option value="urgent">🔥 Urgent</option>
        <option value="other">✨ Other</option>
      </select>
      <input type="date" id="due-date" title="Due date" />
      <input type="time" id="due-time" title="Due time" />
      <button class="btn-add" onclick="addTask()">+ Add</button>
    </div>
    <p class="datetime-hint">📅 Date &amp; time are optional. Tasks with past due dates will be marked overdue.</p>
  </div>

  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
    <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
    <button class="filter-btn" onclick="setFilter('done', this)">Done</button>
    <button class="filter-btn" onclick="setFilter('overdue', this)">🔴 Overdue</button>
    <button class="filter-btn" onclick="setFilter('work', this)">💼 Work</button>
    <button class="filter-btn" onclick="setFilter('personal', this)">🌿 Personal</button>
    <button class="filter-btn" onclick="setFilter('urgent', this)">🔥 Urgent</button>
  </div>

  <div class="task-list" id="task-list"></div>

  <div class="progress-wrap">
    <div class="progress-bar" id="progress-bar" style="width:0%"></div>
  </div>
</div>

<script>
  // ── Auth ──────────────────────────────────────────
  const VALID_USER = 'test';
  const VALID_PASS = 'test';

  function doLogin() {
    const user = document.getElementById('login-username').value.trim();
    const pass = document.getElementById('login-password').value;
    const err  = document.getElementById('login-error');

    if (user === VALID_USER && pass === VALID_PASS) {
      err.classList.remove('show');
      sessionStorage.setItem('doit_user', user);
      showApp(user);
    } else {
      err.classList.add('show');
      document.getElementById('login-password').value = '';
      document.getElementById('login-password').focus();
    }
  }

  function doLogout() {
    sessionStorage.removeItem('doit_user');
    document.getElementById('app-page').classList.remove('visible');
    document.getElementById('login-page').style.display = 'flex';
    document.getElementById('login-username').value = '';
    document.getElementById('login-password').value = '';
    document.getElementById('login-error').classList.remove('show');
  }

  function showApp(username) {
    document.getElementById('login-page').style.display = 'none';
    document.getElementById('app-page').classList.add('visible');
    document.getElementById('logged-user').textContent = username;
    render();
  }

  // Auto-login if session exists
  window.addEventListener('DOMContentLoaded', () => {
    const saved = sessionStorage.getItem('doit_user');
    if (saved) { showApp(saved); }

    // Allow Enter key on login form
    ['login-username','login-password'].forEach(id => {
      document.getElementById(id).addEventListener('keydown', e => {
        if (e.key === 'Enter') doLogin();
      });
    });

    document.getElementById('task-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });
  });

  // ── Tasks ──────────────────────────────────────────
  let tasks = JSON.parse(localStorage.getItem('doit_tasks_v3') || '[]');
  let filter = 'all';

  function save() { localStorage.setItem('doit_tasks_v3', JSON.stringify(tasks)); }

  function addTask() {
    const input   = document.getElementById('task-input');
    const tag     = document.getElementById('tag-select').value;
    const dueDate = document.getElementById('due-date').value;
    const dueTime = document.getElementById('due-time').value;
    const text    = input.value.trim();
    if (!text) { input.focus(); return; }

    tasks.unshift({ id: Date.now(), text, tag, done: false, dueDate, dueTime });
    save(); render();
    input.value = '';
    document.getElementById('due-date').value = '';
    document.getElementById('due-time').value = '';
    input.focus();
  }

  function toggleTask(id) {
    const t = tasks.find(t => t.id === id);
    if (t) { t.done = !t.done; save(); render(); }
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    save(); render();
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function isOverdue(task) {
    if (task.done || !task.dueDate) return false;
    const due = task.dueTime
      ? new Date(task.dueDate + 'T' + task.dueTime)
      : new Date(task.dueDate + 'T23:59:59');
    return due < new Date();
  }

  function formatDue(task) {
    if (!task.dueDate) return null;
    const d     = new Date(task.dueDate + 'T00:00:00');
    const today = new Date(); today.setHours(0,0,0,0);
    const tom   = new Date(today); tom.setDate(today.getDate() + 1);
    let dayStr;
    if (d.getTime() === today.getTime())    dayStr = 'Today';
    else if (d.getTime() === tom.getTime()) dayStr = 'Tomorrow';
    else dayStr = d.toLocaleDateString('en-US', {
      month: 'short', day: 'numeric',
      year: d.getFullYear() !== today.getFullYear() ? 'numeric' : undefined
    });
    let timeStr = '';
    if (task.dueTime) {
      const [h, m] = task.dueTime.split(':').map(Number);
      timeStr = ` ${h % 12 || 12}:${String(m).padStart(2,'0')} ${h >= 12 ? 'PM' : 'AM'}`;
    }
    return dayStr + timeStr;
  }

  function render() {
    const list      = document.getElementById('task-list');
    const total     = tasks.length;
    const done      = tasks.filter(t => t.done).length;
    const overdueCt = tasks.filter(t => isOverdue(t)).length;

    document.getElementById('stat-total').textContent   = total;
    document.getElementById('stat-done').textContent    = done;
    document.getElementById('stat-left').textContent    = total - done;
    document.getElementById('stat-overdue').textContent = overdueCt;
    document.getElementById('progress-bar').style.width = total ? (done/total*100)+'%' : '0%';

    let filtered = [...tasks];
    if (filter === 'active')       filtered = tasks.filter(t => !t.done);
    else if (filter === 'done')    filtered = tasks.filter(t =>  t.done);
    else if (filter === 'overdue') filtered = tasks.filter(t => isOverdue(t));
    else if (['work','personal','urgent','other'].includes(filter))
      filtered = tasks.filter(t => t.tag === filter);

    if (!filtered.length) {
      list.innerHTML = `<div class="empty"><div class="icon">✦</div>No tasks here yet.</div>`;
      return;
    }

    const tagLabel = { work:'💼 Work', personal:'🌿 Personal', urgent:'🔥 Urgent', other:'✨ Other' };

    list.innerHTML = filtered.map(t => {
      const overdue = isOverdue(t);
      const dueStr  = formatDue(t);
      return `
      <div class="task-item ${t.done ? 'done' : ''} ${overdue ? 'overdue' : ''}">
        <div class="checkbox" onclick="toggleTask(${t.id})"></div>
        <div class="task-body">
          <div class="task-text">${escHtml(t.text)}</div>
          <div class="task-meta">
            <span class="tag tag-${t.tag}">${tagLabel[t.tag]}</span>
            ${dueStr ? `<span class="due-badge">🕐 ${escHtml(dueStr)}</span>` : ''}
            ${overdue ? `<span class="overdue-label">Overdue</span>` : ''}
          </div>
        </div>
        <button class="btn-del" onclick="deleteTask(${t.id})" title="Delete">✕</button>
      </div>`;
    }).join('');
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  setInterval(render, 60000);
</script>
</body>
</html>
